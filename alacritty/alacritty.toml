[window]
dimensions = { columns = 80, lines = 24 }
position = { x = 50, y = 50 }
padding = { x = 8, y = 8 }
dynamic_padding = true
decorations = "full"
startup_mode = "Windowed"

[font]
normal = { family = "HackGen35 Console", style = "Regular" }
size = 12
offset = { x = 0, y = 0 }

[colors]
[colors.primary]
background = "0x101010"
foreground = "0xffffff"

[colors.normal]
black = "0x333333"
red = "0xe5266a"
green = "0x3cb371"
yellow = "0xff4c00"
blue = "0x0997B6"
magenta = "0xe5266a"
cyan = "0x0997b6"
white = "0xffffff"

[cursor]
style = "Beam"
blink_interval = 500

[env]
HYPRLAND_CURSOR_THEME = "Breeze_Snow"
HYPRLAND_CURSOR_SIZE = "24"

[general]
live_config_reload = true

[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"

[scrolling]
# Number of lines in the scrollback buffer
history = 100000
# Scrolling speed multiplier for mouse wheel and key scrolls
multiplier = 3

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"
